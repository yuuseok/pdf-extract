services:
  # ---- FastAPI App ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.dev}
    volumes:
      - uploads:/data/uploads
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      hybrid:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Hybrid AI Backend ----
  hybrid:
    build:
      context: .
      dockerfile: Dockerfile.hybrid
    restart: unless-stopped
    environment:
      HYBRID_PORT: 5002
      HYBRID_FORCE_OCR: ${HYBRID_FORCE_OCR:-false}
      HYBRID_OCR_LANG: ${HYBRID_OCR_LANG:-ko,en}
    ports:
      - "${HYBRID_PORT:-5002}:5002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  uploads:
