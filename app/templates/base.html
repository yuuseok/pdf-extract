<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF Extract{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .result-box {
            font-family: 'Pretendard', 'Noto Sans KR', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen bg-base-200">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-sm px-6">
        <div class="flex-1">
            <a href="/" class="text-xl font-bold tracking-tight">
                <span class="text-primary">PDF</span> Extract
            </a>
        </div>
        <div class="flex-none gap-2">
            <a href="/" class="btn btn-ghost btn-sm">Upload</a>
            <a href="/files" class="btn btn-ghost btn-sm">Files</a>
        </div>
    </div>

    <!-- Content -->
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
