services:
  # ---- PostgreSQL (개발용) ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdf_extract_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Hybrid AI Backend (개발용) ----
  hybrid:
    build:
      context: .
      dockerfile: Dockerfile.hybrid
    restart: unless-stopped
    environment:
      HYBRID_PORT: 5002
      HYBRID_FORCE_OCR: "false"
      HYBRID_OCR_LANG: ko,en
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  pgdata_dev:
